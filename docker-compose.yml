services:
  lcloud:
    build:
      context: .
      dockerfile: Dockerfile
    image: lcloud:latest
    container_name: lcloud
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${LC_PORT:-8787}/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
